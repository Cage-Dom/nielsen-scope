#Raw excel sourcefiles, each containing 4 sheets per category distinctions
book_isbn_file:
  type: pandas.ExcelDataset
  filepath: data/01_raw/ISBN List.xlsx
  load_args:
    engine: openpyxl
    sheet_name: null

book_sales_file:
  type: pandas.ExcelDataset
  filepath: data/01_raw/UK Weekly Trended Timeline from 200101_202429.xlsx
  load_args:
    engine: openpyxl
    sheet_name: null

sales_features:
  type: pandas.SQLQueryDataset
  filepath: src/nielsen_scope/sql/features.sql
  credentials: postgres

feature_table:
  type: pandas.ParquetDataset
  filepath: data/04_feature/sales_features.parquet

book_xgb_model:
  type: kedro_mlflow.io.models.MlflowModelTrackingDataset
  flavor: mlflow.xgboost
  save_args:
    registered_model_name: nielsen_xgb_alchemist